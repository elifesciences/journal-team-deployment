apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: prod-journal-dragonfly
  namespace: journal--prod
spec:
  interval: 1m0s
  sourceRef:
    kind: GitRepository
    name: journal-team-deployment
    namespace: flux-system
  path: ./kustomizations/journal/dragonfly
  prune: true
  targetNamespace: journal--prod
  # avoid name collision
  namePrefix: prod-journal-
  postBuild:
    substitute:
      env: prod
