apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: jats-ref-refinery-secret
  namespace: journal--prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: secret-store
    kind: ClusterSecretStore
  target:
    name: jats-ref-refinery-secret
    creationPolicy: Owner
  dataFrom:
  - extract:
      key: journal-team/jats-ref-refinery
