apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: journal-app-latest-feature-branch
  namespace: journal--test
spec:
  imageRepositoryRef:
    name: journal
  filterTags:
    # feature-name-sha-time
    pattern: '^feature-[a-zA-Z0-9-]+-[a-fA-F0-9]+-(?P<ts>.*)'
    extract: '$ts'
  policy:
    numerical:
      order: asc
