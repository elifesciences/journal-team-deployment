apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: journal-app-dev
  namespace: journal--test
spec:
  interval: 1m0s
  sourceRef:
    kind: GitRepository
    name: journal-team-deployment
    namespace: flux-system
  path: ./kustomizations/journal
  prune: true
  targetNamespace: journal--test
  images:
    - name: ghcr.io/elifesciences/journal # {"$imagepolicy": "journal--test:journal-app-latest-feature-branch:name"}
      newTag: feature-testing-the-cluster-imagepolicy-809308750c035a5311a11c4fb165ee43877c2848-20260717.0903 # {"$imagepolicy": "journal--test:journal-app-latest-feature-branch:tag"}
  nameSuffix: -dev
  postBuild:
    substitute:
      # deployment vars
      env: test
      instance_name: journal-app-dev
      hostname: journal-dev.elifesciences.org
      cert_manager_issuer: "letsencrypt"
      journal_secret_parameters_secret_name: journal-app-dev-secret-parameters
      api_url: https://api.test.elifesciences.org
      api_url_search_page: https://api.test.elifesciences.org
      epp_url: http://epp-client.epp--prod:3000
      observer_url: http://prod--observer.elife.internal
      pubpub_url: https://elife-container.pubpub.org
      hubspot_url: https://connect.elifesciences.org
      cache_uri: redis://app-dev-journal-dragonfly-cache:6379
      session_uri: redis://app-dev-journal-dragonfly-sessions:6379
